server:
  shutdown: immediate

logging:
  level:
    org:
      springframework:
        jdbc:
          core:
            JdbcTemplate: TRACE

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

api:
  base:
    url:
      hmpps-auth: http://localhost:8090/auth

spring:
  flyway:
    enabled: true

  datasource:
    url: 'jdbc:h2:mem:nomis-db;MODE=Oracle;DEFAULT_NULL_ORDERING=HIGH'

  jpa:
    show-sql: true

  test:
    database:
      replace: none

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
